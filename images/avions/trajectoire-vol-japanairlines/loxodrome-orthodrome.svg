<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
 "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="700" height="550" version="1.1"
 xmlns="http://www.w3.org/2000/svg"
 xmlns:xlink="http://www.w3.org/1999/xlink">
 <title>Loxodrome</title>
<defs>
<style type="text/css">
.grid{stroke-width:1px; stroke: #000;}
.dot{stroke-width: 1px; stroke: #000; fill: #fff;}
.loxo{stroke-width: 2px; stroke: #000;}
.ortho{stroke-width: 2px; stroke: #f00; fill: none;}
.degree{font-size: 32px; fill: #000; font-family: sans-serif;}
.text{font-size: 19px; fill: #000; font-family: sans-serif;}
.textred{font-size: 19px; fill: #f00; font-family: sans-serif;}
</style>
</defs>

<rect x="0" y="0" width="700" height="550" style="fill: #fff" />

<g transform="translate(0.5 0.5)">
<line x1="90" y1="50" x2="610" y2="50" class="grid" />
<line x1="90" y1="150" x2="610" y2="150" class="grid" />
<line x1="90" y1="250" x2="610" y2="250" class="grid" />
<line x1="90" y1="350" x2="610" y2="350" class="grid" />

<line x1="140" y1="0" x2="140" y2="400"  class="grid" />
<line x1="280" y1="0" x2="280" y2="400"  class="grid" />
<line x1="420" y1="0" x2="420" y2="400"  class="grid" />
<line x1="560" y1="0" x2="560" y2="400"  class="grid" />

<line x1="160" y1="136" x2="543" y2="67" class="loxo" />
<line x1="390" y1="270" x2="543" y2="67" class="loxo" />
<line x1="160" y1="136" x2="390" y2="270" class="loxo" />

<path class="ortho" d="M 160 136 Q 290 150 390 270" />
<path class="ortho" d="M 160 136 Q 330 40 543 67" />
<path class="ortho" d="M 543 67 Q 430 140 390 270" />

<circle cx="160" cy="136" r="7" class="dot" />
<circle cx="543" cy="67" r="7" class="dot" />
<circle cx="390" cy="270" r="7" class="dot" />

<text x="30" y="60" class="degree">60°</text>
<text x="30" y="160" class="degree">40°</text>
<text x="30" y="260" class="degree">20°</text>
<text x="50" y="360" class="degree">0°</text>
<text x="110" y="435" class="degree">80°</text>
<text x="250" y="435" class="degree">40°</text>
<text x="410" y="435" class="degree">0°</text>
<text x="530" y="435" class="degree">40°</text>

<text x="40" y="120" class="text">New York</text>
<text x="570" y="80" class="text">Moskau</text>
<text x="350" y="300" class="text">Dakar</text>

<line x1="150" y1="475" x2="250" y2="475" class="loxo" />
<line x1="150" y1="515" x2="250" y2="515" class="ortho" />
<text x="260" y="480" class="text">Loxodrome</text>
<text x="260" y="520" class="text">Orthodrome</text>

<text x="270" y="60" transform="rotate(30)" class="text">6148 km</text>
<text x="340" y="5" transform="rotate(30)" class="textred">6080 km</text>

<text x="280" y="155" transform="rotate(-10)" class="text">8229 km</text>
<text x="270" y="125" transform="rotate(-10)" class="textred">7416 km</text>

<text x="120" y="485" transform="rotate(-50)" class="text">6600 km</text>
<text x="168" y="435" transform="rotate(-50)" class="textred">6537 km</text>
</g>

</svg>